<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Login | Code With Piyush Studio</title>

  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <main class="admin-login-page">
    <div class="login-card">

      <a href="../index.html" class="admin-logo">
        <span>CWP</span>
        <div>
          Code With <strong>Piyush</strong>
          <small>Studio Admin</small>
        </div>
      </a>

      <div class="login-head">
        <h1>Admin Login</h1>
        <p>Manage website content, projects, blogs and settings.</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="Enter admin email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="admin-btn">Login</button>

        <p class="login-message" id="loginMessage"></p>
      </form>

      <a href="../index.html" class="back-link">Back to Website</a>
    </div>
  </main>

  <script type="module" src="js/admin-login.js"></script>
</body>
</html>
