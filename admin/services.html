<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Manage Services | Code With Piyush Studio</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="admin-layout">

  <aside class="sidebar" id="sidebar">
    <a href="../index.html" class="admin-logo">
      <span>CWP</span>
      <div>
        Code With <strong>Piyush</strong>
        <small>Admin Panel</small>
      </div>
    </a>

    <nav class="admin-menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="services.html" class="active">Services</a>
      <a href="projects.html">Projects</a>
      <a href="blogs.html">Blogs</a>
      <a href="testimonials.html">Testimonials</a>
      <a href="settings.html">Settings</a>
      <a href="../index.html">View Website</a>
    </nav>
  </aside>

  <main class="admin-main">

    <header class="admin-topbar">
      <button class="sidebar-toggle" id="sidebarToggle" type="button">
        <span></span><span></span><span></span>
      </button>

      <div>
        <h1>Manage Services</h1>
        <p>Add, edit and delete website services.</p>
      </div>

      <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
    </header>

    <section class="admin-grid">

      <div class="admin-panel-card">
        <h2 id="formTitle">Add New Service</h2>

        <form class="admin-form" id="serviceForm" onsubmit="return false;">
          <input type="hidden" id="editServiceId">

          <div class="form-group">
            <label>Service Title</label>
            <input type="text" id="serviceTitle" placeholder="Example: Website Design" required>
          </div>

          <div class="form-group">
            <label>Service Category</label>
            <input type="text" id="serviceCategory" placeholder="Example: Web Design" required>
          </div>

          <div class="form-group">
            <label>Service Description</label>
            <textarea id="serviceDescription" rows="5" placeholder="Write service description..." required></textarea>
          </div>

          <button type="button" class="admin-btn" id="saveServiceBtn">Add Service</button>
          <button type="button" class="logout-btn" id="cancelEditBtn" style="display:none; margin-top:10px;">Cancel Edit</button>

          <p class="login-message" id="serviceMessage"></p>
        </form>
      </div>

      <div class="admin-panel-card">
        <h2>Services Preview</h2>
        <div class="admin-list" id="servicesList">Loading...</div>
      </div>

    </section>

  </main>

</div>

<script type="module">
import { db } from "../firebase/config.js";
import {
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const sidebarToggle = document.getElementById("sidebarToggle");
const sidebar = document.getElementById("sidebar");
const logoutBtn = document.getElementById("logoutBtn");

const formTitle = document.getElementById("formTitle");
const editServiceId = document.getElementById("editServiceId");
const serviceTitle = document.getElementById("serviceTitle");
const serviceCategory = document.getElementById("serviceCategory");
const serviceDescription = document.getElementById("serviceDescription");

const saveServiceBtn = document.getElementById("saveServiceBtn");
const cancelEditBtn = document.getElementById("cancelEditBtn");
const servicesList = document.getElementById("servicesList");
const serviceMessage = document.getElementById("serviceMessage");

let servicesData = [];

if (sidebarToggle && sidebar) {
  sidebarToggle.addEventListener("click", () => {
    sidebar.classList.toggle("show");
  });
}

if (logoutBtn) {
  logoutBtn.addEventListener("click", () => {
    window.location.href = "login.html";
  });
}

function resetForm() {
  editServiceId.value = "";
  serviceTitle.value = "";
  serviceCategory.value = "";
  serviceDescription.value = "";

  formTitle.textContent = "Add New Service";
  saveServiceBtn.textContent = "Add Service";
  cancelEditBtn.style.display = "none";
}

async function loadServices() {
  servicesList.innerHTML = "Loading...";

  try {
    const snapshot = await getDocs(collection(db, "services"));
    servicesData = [];

    servicesList.innerHTML = "";

    if (snapshot.empty) {
      servicesList.innerHTML = "<p>No services added yet.</p>";
      return;
    }

    snapshot.forEach((docItem) => {
      const service = {
        id: docItem.id,
        ...docItem.data()
      };

      servicesData.push(service);

      servicesList.innerHTML += `
        <div class="admin-item">
          <div>
            <h3>${service.title}</h3>
            <p>${service.description}</p>
            <small>${service.category}</small>
          </div>

          <div style="display:flex; gap:8px; align-items:flex-start;">
            <button type="button" class="edit-btn" data-id="${service.id}">Edit</button>
            <button type="button" class="delete-btn" data-id="${service.id}">Delete</button>
          </div>
        </div>
      `;
    });

  } catch (error) {
    servicesList.innerHTML = error.message;
    console.log(error);
  }
}

saveServiceBtn.addEventListener("click", async () => {
  const title = serviceTitle.value.trim();
  const category = serviceCategory.value.trim();
  const description = serviceDescription.value.trim();
  const id = editServiceId.value;

  if (!title || !category || !description) {
    serviceMessage.textContent = "Please fill all fields.";
    return;
  }

  serviceMessage.textContent = "Saving...";

  try {
    if (id) {
      await updateDoc(doc(db, "services", id), {
        title,
        category,
        description,
        updatedAt: Date.now()
      });

      serviceMessage.textContent = "Service updated successfully.";
    } else {
      await addDoc(collection(db, "services"), {
        title,
        category,
        description,
        createdAt: Date.now()
      });

      serviceMessage.textContent = "Service added successfully.";
    }

    resetForm();
    loadServices();

  } catch (error) {
    serviceMessage.textContent = error.message;
    console.log(error);
  }
});

servicesList.addEventListener("click", async (e) => {
  const target = e.target;
  const id = target.dataset.id;

  if (!id) return;

  if (target.classList.contains("edit-btn")) {
    const selectedService = servicesData.find((service) => service.id === id);

    if (!selectedService) return;

    editServiceId.value = selectedService.id;
    serviceTitle.value = selectedService.title || "";
    serviceCategory.value = selectedService.category || "";
    serviceDescription.value = selectedService.description || "";

    formTitle.textContent = "Edit Service";
    saveServiceBtn.textContent = "Update Service";
    cancelEditBtn.style.display = "inline-flex";
    serviceMessage.textContent = "Editing mode enabled.";

    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  }

  if (target.classList.contains("delete-btn")) {
    const confirmDelete = confirm("Are you sure you want to delete this service?");

    if (!confirmDelete) return;

    try {
      await deleteDoc(doc(db, "services", id));
      serviceMessage.textContent = "Service deleted successfully.";
      loadServices();
    } catch (error) {
      serviceMessage.textContent = error.message;
      console.log(error);
    }
  }
});

cancelEditBtn.addEventListener("click", () => {
  resetForm();
  serviceMessage.textContent = "Edit cancelled.";
});

loadServices();
</script>

</body>
</html>
