<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Website Settings | Code With Piyush Studio</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-layout">

  <aside class="sidebar" id="sidebar">
    <a href="../index.html" class="admin-logo">
      <span>CWP</span>
      <div>
        Code With <strong>Piyush</strong>
        <small>Admin Panel</small>
      </div>
    </a>

    <nav class="admin-menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="services.html">Services</a>
      <a href="projects.html">Projects</a>
      <a href="blogs.html">Blogs</a>
      <a href="testimonials.html">Testimonials</a>
      <a href="settings.html" class="active">Settings</a>
      <a href="../index.html">View Website</a>
    </nav>
  </aside>

  <main class="admin-main">

    <header class="admin-topbar">
      <button class="sidebar-toggle" id="sidebarToggle">
        <span></span><span></span><span></span>
      </button>

      <div>
        <h1>Website Settings</h1>
        <p>Manage brand, contact, social links and hero content.</p>
      </div>

      <button class="logout-btn" id="logoutBtn">Logout</button>
    </header>

    <section class="admin-grid">

      <div class="admin-panel-card">
        <h2>Brand Settings</h2>

        <form class="admin-form" id="brandForm">
          <div class="form-group">
            <label>Website Name</label>
            <input type="text" id="siteName" value="Code With Piyush Studio">
          </div>

          <div class="form-group">
            <label>Tagline</label>
            <input type="text" id="siteTagline" value="Turning Ideas Into Professional Websites">
          </div>

          <div class="form-group">
            <label>Logo URL</label>
            <input type="text" id="logoUrl" placeholder="assets/logo/logo-dark.svg">
          </div>

          <div class="form-group">
            <label>Favicon URL</label>
            <input type="text" id="faviconUrl" placeholder="assets/logo/favicon.png">
          </div>

          <button type="submit" class="admin-btn">Save Brand Settings</button>
          <p class="login-message" id="brandMessage"></p>
        </form>
      </div>

      <div class="admin-panel-card">
        <h2>Hero Settings</h2>

        <form class="admin-form" id="heroForm">
          <div class="form-group">
            <label>Hero Badge</label>
            <input type="text" id="heroBadge" value="Web Design & Development Studio">
          </div>

          <div class="form-group">
            <label>Hero Title</label>
            <input type="text" id="heroTitle" value="Turning Ideas Into Professional Websites">
          </div>

          <div class="form-group">
            <label>Hero Description</label>
            <textarea id="heroDescription" rows="5">We craft fast, modern and SEO-friendly websites that help businesses build trust, grow online and stand out from the competition.</textarea>
          </div>

          <button type="submit" class="admin-btn">Save Hero Settings</button>
          <p class="login-message" id="heroMessage"></p>
        </form>
      </div>

      <div class="admin-panel-card">
        <h2>Contact Settings</h2>

        <form class="admin-form" id="contactSettingsForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="contactEmail" placeholder="your-email@example.com">
          </div>

          <div class="form-group">
            <label>Phone / WhatsApp</label>
            <input type="text" id="contactPhone" placeholder="+91 XXXXX XXXXX">
          </div>

          <div class="form-group">
            <label>Address</label>
            <textarea id="contactAddress" rows="4" placeholder="Your city, state, country"></textarea>
          </div>

          <button type="submit" class="admin-btn">Save Contact Settings</button>
          <p class="login-message" id="contactSettingsMessage"></p>
        </form>
      </div>

      <div class="admin-panel-card">
        <h2>Social Links</h2>

        <form class="admin-form" id="socialForm">
          <div class="form-group">
            <label>Instagram</label>
            <input type="text" id="instagramLink" placeholder="https://instagram.com/...">
          </div>

          <div class="form-group">
            <label>YouTube</label>
            <input type="text" id="youtubeLink" placeholder="https://youtube.com/...">
          </div>

          <div class="form-group">
            <label>GitHub</label>
            <input type="text" id="githubLink" placeholder="https://github.com/...">
          </div>

          <div class="form-group">
            <label>Facebook</label>
            <input type="text" id="facebookLink" placeholder="https://facebook.com/...">
          </div>

          <button type="submit" class="admin-btn">Save Social Links</button>
          <p class="login-message" id="socialMessage"></p>
        </form>
      </div>

    </section>

  </main>

</div>

<script src="js/admin.js"></script>
</body>
</html>
