<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Manage Projects | Code With Piyush Studio</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="admin-layout">

  <aside class="sidebar" id="sidebar">
    <a href="../index.html" class="admin-logo">
      <span>CWP</span>
      <div>
        Code With <strong>Piyush</strong>
        <small>Admin Panel</small>
      </div>
    </a>

    <nav class="admin-menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="services.html">Services</a>
      <a href="projects.html" class="active">Projects</a>
      <a href="blogs.html">Blogs</a>
      <a href="testimonials.html">Testimonials</a>
      <a href="settings.html">Settings</a>
      <a href="../index.html">View Website</a>
    </nav>
  </aside>

  <main class="admin-main">

    <header class="admin-topbar">
      <button class="sidebar-toggle" id="sidebarToggle" type="button">
        <span></span><span></span><span></span>
      </button>

      <div>
        <h1>Manage Projects</h1>
        <p>Add, edit and manage portfolio projects.</p>
      </div>

      <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
    </header>

    <section class="admin-grid">

      <div class="admin-panel-card">
        <h2 id="projectFormTitle">Add New Project</h2>

        <form class="admin-form" id="projectForm" onsubmit="return false;">
          <input type="hidden" id="editProjectId">

          <div class="form-group">
            <label>Project Title</label>
            <input type="text" id="projectTitle" placeholder="Example: Agency Website" required>
          </div>

          <div class="form-group">
            <label>Project Category</label>
            <input type="text" id="projectCategory" placeholder="Business Website" required>
          </div>

          <div class="form-group">
            <label>Project Image URL</label>
            <input type="text" id="projectImage" placeholder="https://...">
          </div>

          <div class="form-group">
            <label>Project Description</label>
            <textarea id="projectDescription" rows="5" placeholder="Project details..." required></textarea>
          </div>

          <button type="button" class="admin-btn" id="saveProjectBtn">Add Project</button>
          <button type="button" class="logout-btn" id="cancelProjectEditBtn" style="display:none; margin-top:10px;">Cancel Edit</button>

          <p class="login-message" id="projectMessage"></p>
        </form>
      </div>

      <div class="admin-panel-card">
        <h2>Project Preview</h2>
        <div class="admin-list" id="projectsList">Loading...</div>
      </div>

    </section>

  </main>

</div>

<script type="module">
import { db } from "../firebase/config.js";
import {
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const sidebarToggle = document.getElementById("sidebarToggle");
const sidebar = document.getElementById("sidebar");
const logoutBtn = document.getElementById("logoutBtn");

const projectFormTitle = document.getElementById("projectFormTitle");
const editProjectId = document.getElementById("editProjectId");
const projectTitle = document.getElementById("projectTitle");
const projectCategory = document.getElementById("projectCategory");
const projectImage = document.getElementById("projectImage");
const projectDescription = document.getElementById("projectDescription");

const saveProjectBtn = document.getElementById("saveProjectBtn");
const cancelProjectEditBtn = document.getElementById("cancelProjectEditBtn");
const projectsList = document.getElementById("projectsList");
const projectMessage = document.getElementById("projectMessage");

let projectsData = [];

if (sidebarToggle && sidebar) {
  sidebarToggle.addEventListener("click", () => {
    sidebar.classList.toggle("show");
  });
}

if (logoutBtn) {
  logoutBtn.addEventListener("click", () => {
    window.location.href = "login.html";
  });
}

function resetProjectForm() {
  editProjectId.value = "";
  projectTitle.value = "";
  projectCategory.value = "";
  projectImage.value = "";
  projectDescription.value = "";

  projectFormTitle.textContent = "Add New Project";
  saveProjectBtn.textContent = "Add Project";
  cancelProjectEditBtn.style.display = "none";
}

async function loadProjects() {
  projectsList.innerHTML = "Loading...";

  try {
    const snapshot = await getDocs(collection(db, "projects"));
    projectsData = [];

    projectsList.innerHTML = "";

    if (snapshot.empty) {
      projectsList.innerHTML = "<p>No projects added yet.</p>";
      return;
    }

    snapshot.forEach((docItem) => {
      const project = {
        id: docItem.id,
        ...docItem.data()
      };

      projectsData.push(project);

      projectsList.innerHTML += `
        <div class="admin-item">
          <div>
            <h3>${project.title}</h3>
            <p>${project.description}</p>
            <small>${project.category}</small>
            ${project.image ? `<small>Image: ${project.image}</small>` : ""}
          </div>

          <div style="display:flex; gap:8px; align-items:flex-start;">
            <button type="button" class="edit-project-btn" data-id="${project.id}">Edit</button>
            <button type="button" class="delete-project-btn" data-id="${project.id}">Delete</button>
          </div>
        </div>
      `;
    });

  } catch (error) {
    projectsList.innerHTML = error.message;
    console.log(error);
  }
}

saveProjectBtn.addEventListener("click", async () => {
  const title = projectTitle.value.trim();
  const category = projectCategory.value.trim();
  const image = projectImage.value.trim();
  const description = projectDescription.value.trim();
  const id = editProjectId.value;

  if (!title || !category || !description) {
    projectMessage.textContent = "Please fill all required fields.";
    return;
  }

  projectMessage.textContent = "Saving...";

  try {
    if (id) {
      await updateDoc(doc(db, "projects", id), {
        title,
        category,
        image,
        description,
        updatedAt: Date.now()
      });

      projectMessage.textContent = "Project updated successfully.";
    } else {
      await addDoc(collection(db, "projects"), {
        title,
        category,
        image,
        description,
        createdAt: Date.now()
      });

      projectMessage.textContent = "Project added successfully.";
    }

    resetProjectForm();
    loadProjects();

  } catch (error) {
    projectMessage.textContent = error.message;
    console.log(error);
  }
});

projectsList.addEventListener("click", async (e) => {
  const target = e.target;
  const id = target.dataset.id;

  if (!id) return;

  if (target.classList.contains("edit-project-btn")) {
    const selectedProject = projectsData.find((project) => project.id === id);

    if (!selectedProject) return;

    editProjectId.value = selectedProject.id;
    projectTitle.value = selectedProject.title || "";
    projectCategory.value = selectedProject.category || "";
    projectImage.value = selectedProject.image || "";
    projectDescription.value = selectedProject.description || "";

    projectFormTitle.textContent = "Edit Project";
    saveProjectBtn.textContent = "Update Project";
    cancelProjectEditBtn.style.display = "inline-flex";
    projectMessage.textContent = "Editing mode enabled.";

    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  }

  if (target.classList.contains("delete-project-btn")) {
    const confirmDelete = confirm("Are you sure you want to delete this project?");

    if (!confirmDelete) return;

    try {
      await deleteDoc(doc(db, "projects", id));
      projectMessage.textContent = "Project deleted successfully.";
      loadProjects();
    } catch (error) {
      projectMessage.textContent = error.message;
      console.log(error);
    }
  }
});

cancelProjectEditBtn.addEventListener("click", () => {
  resetProjectForm();
  projectMessage.textContent = "Edit cancelled.";
});

loadProjects();
</script>

</body>
</html>
